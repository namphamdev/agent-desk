name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: Electrobun build channel
        required: true
        default: canary
        type: choice
        options:
          - canary
          - stable

# Electrobun packages for the host OS only — matrix builds each platform natively.
jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Resolve build channel
        id: channel
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "name=stable" >> "$GITHUB_OUTPUT"
          else
            echo "name=canary" >> "$GITHUB_OUTPUT"
          fi
          echo "Building channel: $(grep name= "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Build (canary)
        if: steps.channel.outputs.name == 'canary'
        run: bun run build:canary

      - name: Build (stable)
        if: steps.channel.outputs.name == 'stable'
        run: bun run build:stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terminal-react-${{ steps.channel.outputs.name }}-${{ runner.os }}-${{ runner.arch }}
          path: |
            artifacts/**
            build/**
          if-no-files-found: warn
          retention-days: 14

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
